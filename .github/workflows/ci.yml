name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ---- Backend Lint & Validation ----
  backend:
    name: Backend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Verify server starts
        run: |
          timeout 5 node src/server.js &
          sleep 2
          curl -f http://localhost:8000/api/health || exit 1
          echo "✅ Backend health check passed"
        env:
          PORT: 8000
          GEMINI_API_KEY: test
          GMAIL_USER: test@test.com
          GMAIL_APP_PASSWORD: test

  # ---- Frontend Lint & Build ----
  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ---- Docker Build Validation ----
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t rabbitt-backend ./backend

      - name: Build Frontend Image
        run: docker build -t rabbitt-frontend ./frontend

      - name: Verify images
        run: |
          docker images | grep rabbitt
          echo "✅ Docker images built successfully"
